<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面试回答挖空练习</title>
<script>(function(){try{var t=localStorage.getItem("ip_theme");if(!t&&window.matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches)t="dark";if(t==="dark")document.documentElement.setAttribute("data-theme","dark");}catch(e){}})();</script>
<meta name="color-scheme" content="light dark">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23f4f1ea'/%3E%3Ctext x='50' y='50' text-anchor='middle' dominant-baseline='central' font-size='62'%3E%F0%9F%8E%A4%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Serif:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* light: muted warm greys, no whites, no pale tints; text stays dark */
    --bg:#d8d5cd;
    --panel:#d2cfc7;
    --card:#e0ddd5;
    --card-hi:#e5e2da;
    --ink:#2e2b26;
    --ink-hover:#454138;
    --muted:#6c6960;
    --faint:#949085;
    --line:#c1beb4;
    --line-strong:#b3afa4;
    --pat-ink:#6f571c;
    --phr-ink:#43596d;
    --hover:#cbc8bf;
    --well:#c7c4bb;
    --chip:#ccc8bf;
    --sel:#c2bcaa;
    --on-ink-fg:#dedbd3;
    --scrim:rgba(30,28,24,.5);
    --ring:rgba(90,85,75,.25);
    --danger:#9c4030;
    --sans:"IBM Plex Sans","PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    --serif:"IBM Plex Serif","PingFang SC","Microsoft YaHei",Georgia,serif;
    --mono:"IBM Plex Mono","PingFang SC","Microsoft YaHei",ui-monospace,monospace;
    --radius:14px;
  }
  html[data-theme="dark"]{
    /* dark: charcoal greys, no pure black; text is soft light grey, never white */
    --bg:#262420;
    --panel:#221f1b;
    --card:#2d2b26;
    --card-hi:#34312b;
    --ink:#c8c5bc;
    --ink-hover:#d8d5cc;
    --muted:#8b877c;
    --faint:#5f5b52;
    --line:#3a3830;
    --line-strong:#464339;
    --pat-ink:#b89d58;
    --phr-ink:#8aa3b8;
    --hover:#34322c;
    --well:#1f1d19;
    --chip:#3b382f;
    --sel:#4a463c;
    --on-ink-fg:#262420;
    --scrim:rgba(0,0,0,.55);
    --ring:rgba(160,155,140,.22);
    --danger:#c9705c;
    color-scheme:dark;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--sans);
    font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer;color:inherit;}
  ::selection{background:var(--sel);}

  .app{display:grid;grid-template-columns:288px 1fr;height:100vh;}

  /* ---------- sidebar ---------- */
  .side{
    border-right:1px solid var(--line);background:var(--panel);
    display:flex;flex-direction:column;min-height:0;
  }
  .side-head{
    padding:20px 20px 14px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;gap:10px;
  }
  #listToggle{display:none;white-space:nowrap;}
  #listToggle .lt-chev{display:inline-block;transition:transform .15s;}
  .side.open #listToggle .lt-chev{transform:rotate(180deg);}
  .brand{font-family:var(--serif);font-weight:600;font-size:19px;letter-spacing:.2px;}
  .brand-sub{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:4px;letter-spacing:.4px;text-transform:uppercase;}
  .side-tools{display:flex;gap:8px;padding:12px 16px;border-bottom:1px solid var(--line);}
  .side-tools .btn{flex:1;}
  .qlist{overflow-y:auto;padding:10px;flex:1;min-height:0;}
  .ghead{display:flex;align-items:center;gap:7px;padding:14px 6px 6px;
         color:var(--muted);user-select:none;cursor:pointer;border-radius:8px;}
  .ghead:hover{color:var(--ink);}
  .ghead:first-child{padding-top:4px;}
  .ghead .chev{display:inline-block;transition:transform .15s;font-size:13px;line-height:1;}
  .ghead.closed .chev{transform:rotate(-90deg);}
  .ghead .gname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
                font-family:var(--serif);font-size:16px;font-weight:600;color:var(--ink);letter-spacing:.2px;}
  .ghead .gcount{font-family:var(--mono);font-size:11px;}
  .ghead .gbtn{border:none;background:none;color:var(--faint);font-size:12px;padding:1px 5px;border-radius:5px;visibility:hidden;cursor:pointer;}
  .ghead:hover .gbtn{visibility:visible;}
  .ghead .gbtn:hover{color:var(--ink);background:var(--hover);}
  @media (prefers-reduced-motion:reduce){.ghead .chev{transition:none;}}
  .qitem{
    padding:12px 13px;border-radius:11px;border:1px solid transparent;
    margin-bottom:6px;cursor:pointer;transition:background .12s,border-color .12s;
  }
  .qitem:hover{background:var(--hover);}
  .qitem.active{background:var(--card-hi);border-color:var(--line-strong);}
  .qitem-top{display:flex;align-items:flex-start;gap:6px;}
  .qitem-title{font-weight:500;font-size:14.5px;line-height:1.35;flex:1;min-width:0;}
  .star{border:none;background:none;cursor:pointer;padding:0 2px;line-height:1;
        font-size:15px;color:var(--faint);flex:0 0 auto;border-radius:5px;}
  .star::before{content:"☆";}
  .star.on::before{content:"★";}
  .star:hover{color:var(--ink);}
  .star.on{color:var(--pat-ink);}
  .qitem-meta{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-top:6px;letter-spacing:.3px;
              display:flex;align-items:center;gap:4px;}
  .qitem-meta b{color:var(--pat-ink);font-weight:500;}
  .qitem-meta i{color:var(--phr-ink);font-style:normal;font-weight:500;}
  .cnt{margin-left:auto;display:inline-flex;align-items:center;gap:2px;}
  .cnt-n{min-width:16px;text-align:center;color:var(--ink);font-weight:600;font-size:11.5px;}
  .cnt button{border:1px solid var(--line-strong);background:var(--card);color:var(--muted);
              width:19px;height:19px;border-radius:6px;font-size:12px;line-height:1;padding:0;
              display:inline-flex;align-items:center;justify-content:center;}
  .cnt button:hover{color:var(--ink);border-color:var(--faint);}
  .cnt button:active{background:var(--hover);}

  /* ---------- main ---------- */
  .main{overflow-y:auto;min-height:0;}
  .main-inner{max-width:760px;margin:0 auto;padding:38px 40px 90px;}
  .ans-title{font-family:var(--serif);font-weight:600;font-size:27px;line-height:1.25;margin:0 0 22px;}

  .controls{display:flex;flex-wrap:wrap;align-items:center;gap:14px;margin-bottom:8px;}
  .seg{display:inline-flex;background:var(--well);border-radius:10px;padding:3px;}
  .seg button{
    border:none;background:transparent;padding:7px 16px;border-radius:8px;
    font-size:13.5px;font-weight:500;color:var(--muted);transition:all .14s;
  }
  .seg button.on{background:var(--card-hi);color:var(--ink);}
  .seg button:hover:not(.on){color:var(--ink);}

  .aux{display:flex;gap:8px;margin-left:auto;}
  .toggle{
    border:1px solid var(--line-strong);background:transparent;border-radius:8px;
    padding:6px 12px;font-size:12.5px;color:var(--muted);transition:all .14s;
  }
  .toggle:hover{border-color:var(--faint);color:var(--ink);}
  .toggle.on{background:var(--ink);border-color:var(--ink);color:var(--on-ink-fg);}
  .toggle[hidden]{display:none;}

  .rowbtns{display:flex;gap:8px;margin-bottom:20px;}
  .linkbtn{background:none;border:none;font-size:12.5px;color:var(--muted);padding:2px 0;}
  .linkbtn:hover{color:var(--ink);text-decoration:underline;}
  .linkbtn.danger:hover{color:var(--danger);}

  /* ---------- practice card ---------- */
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:30px 32px;font-family:var(--serif);font-size:18px;line-height:2.05;
    box-shadow:none;
  }
  .card p{margin:0 0 1.1em;}
  .card p:last-child{margin-bottom:0;}

  /* target = plain text, no colored background; a small number prefixes each item */
  .num{font-family:var(--mono);font-size:.6em;font-weight:600;color:var(--muted);
       vertical-align:.55em;margin:0 3px 0 1px;user-select:none;}
  .hl{position:relative;cursor:pointer;}
  .hl:hover{text-decoration:underline dotted var(--faint);text-underline-offset:4px;}
  /* pinned / global inline zh */
  .hl.pinned::after,.card.show-zh .hl::after{
    content:attr(data-zh);font-family:var(--sans);font-size:.62em;font-weight:500;
    margin-left:6px;padding:1px 6px;border-radius:5px;vertical-align:2px;
    background:var(--chip);color:var(--muted);white-space:nowrap;text-decoration:none;
  }
  /* hover tooltip (desktop) */
  .hl[data-zh]:not([data-zh=""]):hover::before{
    content:attr(data-zh);position:absolute;left:50%;bottom:calc(100% + 7px);
    transform:translateX(-50%);font-family:var(--sans);font-size:12.5px;line-height:1.4;
    background:var(--ink);color:var(--on-ink-fg);padding:6px 10px;border-radius:8px;white-space:nowrap;
    z-index:5;pointer-events:none;box-shadow:0 3px 12px rgba(0,0,0,.22);
  }
  .card.show-zh .hl:hover::before,.hl.pinned:hover::before{display:none;}

  /* blank */
  .blank{
    display:inline-block;vertical-align:bottom;min-width:1.7em;max-width:var(--w,6ch);
    overflow:hidden;white-space:nowrap;
    border-bottom:1.7px solid var(--faint);line-height:1.2;cursor:pointer;
    transition:border-color .14s;
  }
  .blank .bt{visibility:hidden;} /* truly not rendered: survives forced-colors / high contrast */
  .blank:hover{border-bottom-color:var(--ink);}
  .blank.revealed,.card.reveal-blanks .blank{
    max-width:none;overflow:visible;white-space:normal;color:var(--muted);border-bottom-color:var(--line);
  }
  .blank.revealed .bt,.card.reveal-blanks .blank .bt{visibility:visible;}
  /* per-sentence reveal dot */
  .sbtn{border:none;background:none;cursor:pointer;font-family:var(--sans);
        color:var(--faint);padding:0 4px;margin-left:3px;font-size:.78em;
        display:inline-block;vertical-align:middle;line-height:1;border-radius:6px;}
  .sbtn::before{content:"○";}
  .sbtn.on::before{content:"●";}
  .sbtn:hover{color:var(--ink);background:var(--hover);}
  .sbtn.on{color:var(--phr-ink);}
  @media (forced-colors:active){
    .blank{border-bottom-width:2px;}
  }

  /* footnote for unmatched items */
  .footnote{margin-top:16px;font-family:var(--sans);font-size:12px;color:var(--muted);
            line-height:1.6;padding:11px 14px;background:var(--panel);border:1px dashed var(--line-strong);
            border-radius:10px;}
  .footnote b{color:var(--ink);font-weight:500;}

  /* ---------- buttons ---------- */
  .btn{
    border:1px solid var(--line-strong);background:var(--card);border-radius:9px;
    padding:8px 14px;font-size:13px;font-weight:500;transition:all .14s;
  }
  .btn:hover{border-color:var(--faint);}
  .btn.primary{background:var(--ink);border-color:var(--ink);color:var(--on-ink-fg);}
  .btn.primary:hover{background:var(--ink-hover);border-color:var(--ink-hover);}
  .btn.ghost{background:transparent;}

  /* ---------- empty ---------- */
  .empty{max-width:520px;margin:14vh auto 0;text-align:center;color:var(--muted);}
  .empty h2{font-family:var(--serif);color:var(--ink);font-weight:600;font-size:22px;margin:0 0 10px;}
  .empty p{margin:0 0 22px;line-height:1.6;}

  /* ---------- modal ---------- */
  .overlay{position:fixed;inset:0;background:var(--scrim);display:none;
           align-items:flex-start;justify-content:center;padding:40px 16px;z-index:50;overflow-y:auto;}
  .overlay.show{display:flex;}
  .modal{background:var(--bg);border-radius:16px;width:100%;max-width:660px;
         box-shadow:0 20px 60px rgba(0,0,0,.28);border:1px solid var(--line-strong);}
  .modal-head{display:flex;align-items:center;justify-content:space-between;
              padding:20px 24px;border-bottom:1px solid var(--line);}
  .modal-head h3{font-family:var(--serif);font-weight:600;font-size:19px;margin:0;}
  .modal-body{padding:22px 24px;}
  .field{margin-bottom:18px;}
  .field label{display:block;font-size:12.5px;font-weight:500;color:var(--muted);margin-bottom:6px;
               font-family:var(--mono);letter-spacing:.3px;text-transform:uppercase;}
  .field .desc{font-size:12px;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0;
               margin-top:3px;font-family:var(--sans);}
  input.f,textarea.f{
    width:100%;border:1px solid var(--line-strong);border-radius:9px;background:var(--card);
    padding:10px 12px;font-family:var(--sans);font-size:14px;color:var(--ink);resize:vertical;
  }
  input.f:focus,textarea.f:focus{outline:none;border-color:var(--faint);box-shadow:0 0 0 3px var(--ring);}
  textarea.f{line-height:1.5;}
  .modal-foot{display:flex;gap:10px;padding:16px 24px 22px;align-items:center;}
  .modal-foot .spacer{flex:1;}
  details.quick{margin-bottom:18px;border:1px solid var(--line);border-radius:10px;background:var(--panel);}
  details.quick summary{padding:11px 14px;font-size:13px;font-weight:500;cursor:pointer;color:var(--ink);list-style:none;}
  details.quick summary::-webkit-details-marker{display:none;}
  details.quick summary::before{content:"⌵ ";color:var(--muted);}
  details.quick[open] summary::before{content:"⌃ ";}
  details.quick .qbody{padding:0 14px 14px;}

  a{color:var(--phr-ink);}
  button:focus-visible,summary:focus-visible,input:focus-visible,textarea:focus-visible,.qitem:focus-visible{
    outline:2px solid var(--phr-ink);outline-offset:2px;
  }

  /* ---------- responsive ---------- */
  @media (max-width:820px){
    .app{grid-template-columns:1fr;height:auto;min-height:100vh;grid-template-rows:auto 1fr;}
    .side{border-right:none;border-bottom:1px solid var(--line);}
    .side-head{padding:13px 14px;}
    .brand{font-size:16px;}
    .brand-sub{font-size:9.5px;margin-top:2px;}
    #listToggle{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;}
    /* card list is a collapsible drawer on mobile */
    .side-tools,.qlist{display:none;}
    .side.open .side-tools{display:flex;}
    .side.open .qlist{display:block;max-height:62vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
    .qitem{margin-bottom:6px;}
    .cnt button{width:24px;height:24px;font-size:14px;}
    .cnt-n{font-size:12.5px;min-width:20px;}
    .sbtn{font-size:.86em;padding:3px 6px;}
    .ghead .gbtn{visibility:visible;}
    /* main content */
    .main-inner{padding:20px 14px 70px;}
    .ans-title{font-size:21px;margin-bottom:16px;}
    .controls{gap:10px;}
    .seg button{padding:7px 13px;font-size:13px;}
    .aux{margin-left:0;width:100%;}
    .toggle{padding:7px 11px;}
    .card{padding:18px 15px;font-size:16.5px;line-height:1.95;border-radius:12px;}
    .footnote{font-size:11.5px;}
    /* editor modal */
    .overlay{padding:12px 8px;align-items:stretch;}
    .modal{max-width:none;border-radius:14px;display:flex;flex-direction:column;max-height:calc(100vh - 24px);}
    .modal-head{padding:14px 16px;}
    .modal-body{padding:16px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
    .modal-foot{padding:12px 16px 16px;}
    /* 16px inputs stop iOS auto-zoom on focus */
    input.f,textarea.f{font-size:16px;}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <div class="side-head">
      <div>
        <div class="brand">面试回答挖空练习</div>
        <div class="brand-sub">full · pattern · phrase</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn ghost" id="themeToggle" title="切换浅色/深色" aria-label="切换浅色或深色模式">◐</button>
        <button class="btn ghost" id="listToggle" aria-expanded="false">卡片列表 <span class="lt-chev">⌄</span></button>
      </div>
    </div>
    <div class="side-tools">
      <button class="btn primary" id="newBtn">+ 新建</button>
      <button class="btn ghost" id="importBtn">导入</button>
      <button class="btn ghost" id="exportBtn">导出</button>
      <input type="file" id="importFile" accept="application/json" hidden>
    </div>
    <div class="qlist" id="qlist"></div>
  </aside>

  <main class="main">
    <div class="main-inner" id="mainInner"></div>
  </main>
</div>

<!-- editor modal -->
<div class="overlay" id="overlay">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <h3 id="modalTitle">编辑回答</h3>
      <button class="btn ghost" id="closeModal" aria-label="关闭">✕</button>
    </div>
    <div class="modal-body">
      <details class="quick">
        <summary>快速粘贴（按你的原格式一次填入）</summary>
        <div class="qbody">
          <textarea class="f" id="pasteBox" rows="7" placeholder="把「问题 / **句型** / **短语** / 回答全文」整段粘进来，点下面的按钮自动拆分填入。"></textarea>
          <div style="margin-top:10px;"><button class="btn" id="parseBtn">解析并填入</button></div>
        </div>
      </details>

      <div class="field">
        <label>标题</label>
        <input class="f" id="fTitle" placeholder="例：Sonio GTM 介绍">
      </div>
      <div class="field">
        <label>分组</label>
        <div class="desc">输入新名称即创建分组，选已有名称即归入该组，留空则放在「未分组」。</div>
        <input class="f" id="fGroup" list="groupList" placeholder="例：实习总体介绍">
        <datalist id="groupList"></datalist>
      </div>
      <div class="field">
        <label>句型（每行一个）</label>
        <div class="desc">格式：<code>English text (中文)</code>，用 <code>...</code> 表示可替换的空位。中文可留空。</div>
        <textarea class="f" id="fPatterns" rows="6" placeholder="... is a SaaS company in a pretty niche ... space (...是一家处于相当小众...领域的 SaaS 公司)"></textarea>
      </div>
      <div class="field">
        <label>短语（每行一个）</label>
        <div class="desc">格式：<code>English (中文)</code>。中文可留空。</div>
        <textarea class="f" id="fPhrases" rows="6" placeholder="go-to-market motion (市场进入打法)"></textarea>
      </div>
      <div class="field">
        <label>回答全文</label>
        <textarea class="f" id="fFull" rows="8" placeholder="粘贴完整回答。段落之间空一行即可。"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn ghost linkbtn danger" id="deleteBtn" style="display:none;">删除这条</button>
      <div class="spacer"></div>
      <button class="btn ghost" id="cancelBtn">取消</button>
      <button class="btn primary" id="saveBtn">保存</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   Matching engine  (verified against the seed data in Node)
   ============================================================ */
const IRREGULARS=[
  ['bring','brings','bringing','brought'],['make','makes','making','made'],
  ['take','takes','taking','took','taken'],['get','gets','getting','got','gotten'],
  ['go','goes','going','went','gone'],['have','has','having','had'],
  ['do','does','doing','did','done'],['see','sees','seeing','saw','seen'],
  ['build','builds','building','built'],['send','sends','sending','sent'],
  ['find','finds','finding','found'],['keep','keeps','keeping','kept'],
  ['run','runs','running','ran'],['begin','begins','beginning','began','begun'],
  ['buy','buys','buying','bought'],['think','thinks','thinking','thought'],
  ['lead','leads','leading','led'],['grow','grows','growing','grew','grown'],
  ['drive','drives','driving','drove','driven'],['sell','sells','selling','sold'],
];
const APOS="['\\u2018\\u2019\\u02BC]";
function normApos(s){return s.replace(/[\u2018\u2019\u02BC]/g,"'").replace(/[\u201C\u201D]/g,'"');}
function esc(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');}
function apFlex(escaped){return escaped.replace(/'/g,APOS);} // regex accepts straight or curly apostrophe
function coreFragment(core){
  // core comes from a normApos'd query, so apostrophes here are straight
  let base=core,poss='';
  const pm=base.match(/^([A-Za-z]{2,})('s|s'|')$/i); // possessive tail: word's / words' / word'
  if(pm){base=pm[1];poss='(?:'+APOS+'?[sS]?|[sS]?'+APOS+'?)';}
  const low=base.toLowerCase();
  for(const g of IRREGULARS){if(g.includes(low))return '(?:'+g.map(esc).join('|')+')'+poss;}
  const pure=/^[a-z]+$/.test(low);
  if(!pure||low.length<=3)return apFlex(esc(base))+poss; // short, or contains ' (it's, don't): exact but apostrophe-flexible
  let stem=low;
  for(const sf of ['ing','es','ed','s','d']){if(stem.length-sf.length>=2&&stem.endsWith(sf)){stem=stem.slice(0,-sf.length);break;}}
  return esc(stem)+'[a-z]{0,3}'+poss;
}
function buildRegex(query){
  const cores=normApos(query).trim().split(/[^A-Za-z0-9']+/).filter(Boolean);
  if(!cores.length)return null;
  const body=cores.map(coreFragment).join('[^A-Za-z0-9]+');
  try{return new RegExp('(?<![A-Za-z0-9])'+body+'(?![A-Za-z0-9])','gi');}
  catch(e){return new RegExp(body,'gi');}
}
function findAfter(text,query,cursor){
  const re=buildRegex(query);if(!re)return null;re.lastIndex=cursor||0;
  const m=re.exec(text);return m?{start:m.index,end:m.index+m[0].length}:null;
}
function findAll(text,query){
  const re=buildRegex(query);if(!re)return[];
  const out=[];let m,guard=0;
  while((m=re.exec(text))&&guard++<800){out.push({start:m.index,end:m.index+m[0].length});if(m.index===re.lastIndex)re.lastIndex++;}
  return out;
}
function matchPattern(text,pat){
  const lits=normApos(pat).split(/\s*(?:\.\.\.|…)\s*/).map(s=>s.trim()).filter(Boolean);
  const spans=[];let cursor=0;
  for(const lit of lits){const sp=findAfter(text,lit,cursor);if(sp){spans.push(sp);cursor=sp.end;}}
  return {spans,matched:spans.length>0};
}

/* ============================================================
   Rendering helpers
   ============================================================ */
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escAttr(s){return escHtml(s).replace(/"/g,'&quot;');}
function spacesToHtml(s){return escHtml(s).replace(/\n/g,'<br>');}

function computeItems(answer,kind){
  const text=answer.fullText||'';
  const src=kind==='pattern'?(answer.patterns||[]):(answer.phrases||[]);
  return src.map(it=>{
    const r=kind==='pattern'?matchPattern(text,it.en):{spans:findAll(text,it.en)};
    return {en:it.en,zh:it.zh||'',spans:r.spans};
  });
}

function renderFull(text){
  return text.split(/\n{2,}/).map(p=>'<p>'+spacesToHtml(p)+'</p>').join('');
}

function sentenceSpans(text){
  // sentence ends at . ! ? (plus closing quotes/brackets) followed by whitespace or EOL;
  // decimals like 4.5 don't split because no whitespace follows the dot
  const spans=[];let start=0;
  const re=/[.!?]+["'\u201D\u2019)\]]*(?=\s|$)/g;let m;
  while((m=re.exec(text))){const end=m.index+m[0].length;spans.push({start,end});start=end;}
  if(start<text.length)spans.push({start,end:text.length});
  return spans;
}

function renderMasked(text,items){
  // owner map: first-wins
  const owner=new Int16Array(text.length).fill(-1);
  items.forEach((it,idx)=>it.spans.forEach(sp=>{
    for(let i=sp.start;i<sp.end&&i<text.length;i++) if(owner[i]===-1) owner[i]=idx;
  }));
  const paras=[];{
    let re=/\n{2,}/g,last=0,m;
    while((m=re.exec(text))){paras.push([last,m.index]);last=m.index+m[0].length;}
    paras.push([last,text.length]);
  }
  const sents=sentenceSpans(text);
  const seen=new Set();
  function emitRange(rs,re2,sIdx,st){ // render one owner-chunk walk over [rs,re2)
    let seg='',i=rs;
    while(i<re2){
      const o=owner[i];let j=i+1;while(j<re2&&owner[j]===o)j++;
      const chunk=text.slice(i,j);
      if(o>=0){
        const it=items[o];
        let num='';
        if(!seen.has(o)){seen.add(o); if(it.num) num='<span class="num">'+it.num+'.</span>';}
        seg+=num+'<span class="hl" data-zh="'+escAttr(it.zh)+'" data-i="'+o+'">'+escHtml(chunk)+'</span>';
      }else{
        const lead=chunk.match(/^\s*/)[0], trail=chunk.match(/\s*$/)[0];
        const core=chunk.slice(lead.length,chunk.length-trail.length);
        seg+=spacesToHtml(lead);
        if(core.length){
          if(!/[A-Za-z0-9]/.test(core)){
            seg+=escHtml(core); // punctuation only: keep visible as glue
          }else{
            const w=Math.min(Math.max(core.replace(/\s+/g,' ').length,2),8);
            seg+='<span class="blank" style="--w:'+w+'ch" data-s="'+sIdx+'"><span class="bt">'+escHtml(core)+'</span></span>';
            st.hasBlank=true;
          }
        }
        seg+=spacesToHtml(trail);
      }
      i=j;
    }
    return seg;
  }
  let html='';
  for(const [ps,pe] of paras){
    if(pe<=ps){continue;}
    let seg='';
    for(let s=0;s<sents.length;s++){
      const ss=Math.max(sents[s].start,ps), se=Math.min(sents[s].end,pe);
      if(se<=ss)continue;
      const st={hasBlank:false};
      seg+=emitRange(ss,se,s,st);
      if(st.hasBlank)
        seg+='<button class="sbtn" data-s="'+s+'" title="显示/隐藏本句被挖空的内容" aria-label="显示或隐藏本句被挖空的内容"></button>';
    }
    html+='<p>'+seg+'</p>';
  }
  return html;
}

const mainInner=document.getElementById('mainInner');

const UNGROUPED='未分组';
const FAV='收藏';
function groupOf(a){return (a.group||'').trim()||UNGROUPED;}
function allGroups(){

function closeDrawer(){

// One answer object can be rendered in two places (its own group and 收藏).
// Both nodes point at the same object, so edits and counts are shared by construction.
function buildCard(a){
  if(typeof a.reviews!=='number')a.reviews=0;
  const el=document.createElement('div');
  el.className='qitem'+(a.id===state.selectedId?' active':'');
  el.dataset.id=a.id;
  el.tabIndex=0;
  el.innerHTML='<div class="qitem-top">'+
      '<div class="qitem-title">'+escHtml(a.title||'（未命名）')+'</div>'+
      '<button class="star'+(a.fav?' on':'')+'" aria-label="收藏或取消收藏"></button>'+
    '</div>'+
    '<div class="qitem-meta">句型 <b>'+(a.patterns||[]).length+'</b> · 短语 <i>'+(a.phrases||[]).length+'</i>'+
    '<span class="cnt">'+
    '<button data-d="-1" aria-label="减少复习次数">−</button>'+
    '<span class="cnt-n">'+a.reviews+'</span>'+
    '<button data-d="1" aria-label="增加复习次数">+</button></span></div>';
  el.querySelector('.star').onclick=e=>{
    e.stopPropagation();
    a.fav=!a.fav;
    if(a.fav)state.openGroup=FAV;
    save();renderSidebar();
  };
  el.querySelectorAll('.cnt button').forEach(b=>{
    b.onclick=e=>{
      e.stopPropagation();
      a.reviews=Math.max(0,(a.reviews||0)+parseInt(b.dataset.d,10));
      // the same card may be on screen twice; update every copy
      qlist.querySelectorAll('.qitem[data-id="'+a.id+'"] .cnt-n').forEach(n=>{n.textContent=a.reviews;});
      save();
    };
  });
  el.onclick=()=>{state.selectedId=a.id;save();renderAll();closeDrawer();};
  el.onkeydown=e=>{if((e.key==='Enter'||e.key===' ')&&e.target===el){e.preventDefault();el.click();}};
  return el;
}
function renderSidebar(){
  const scroll=qlist.scrollTop;
  qlist.innerHTML='';
  const groups=new Map();
  state.answers.forEach(a=>{const g=groupOf(a);if(!groups.has(g))groups.set(g,[]);groups.get(g).push(a);});
  const names=[...groups.keys()].filter(g=>g!==UNGROUPED);
  if(groups.has(UNGROUPED))names.push(UNGROUPED);
  const favs=state.answers.filter(a=>a.fav);
  const sections=[];
  if(favs.length)sections.push({name:FAV,list:favs,virtual:true});
  names.forEach(n=>sections.push({name:n,list:groups.get(n),virtual:false}));
  const headerless=(sections.length===1&&sections[0].name===UNGROUPED);
  for(const sec of sections){
    const gname=sec.name,list=sec.list;
    const isOpen=headerless||state.openGroup===gname;
    if(!headerless){
      const gh=document.createElement('div');
      gh.className='ghead'+(isOpen?'':' closed');
      gh.tabIndex=0;
      gh.innerHTML='<span class="chev">⌄</span><span class="gname">'+(sec.virtual?'★ ':'')+escHtml(gname)+'</span>'+
        '<span class="gcount">'+list.length+'</span>'+
        (sec.virtual||gname===UNGROUPED?'':'<button class="gbtn" title="重命名或解散分组">✎</button>');
      // accordion: opening one group closes whatever else was open
      const toggle=()=>{state.openGroup=isOpen?null:gname;save();renderSidebar();};
      gh.onclick=toggle;
      gh.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggle();}};
      const btn=gh.querySelector('.gbtn');
      if(btn)btn.onclick=e=>{e.stopPropagation();
        const nn=prompt('重命名分组「'+gname+'」\n（清空后确定 = 解散分组，卡片移入「'+UNGROUPED+'」）',gname);
        if(nn===null)return;
        const newName=nn.trim();
        state.answers.forEach(a=>{if(groupOf(a)===gname)a.group=newName;});
        if(state.openGroup===gname)state.openGroup=newName||null;
        save();renderAll();
      };
      qlist.appendChild(gh);
    }
    if(!isOpen)continue;
    list.forEach(a=>qlist.appendChild(buildCard(a)));
  }
  qlist.scrollTop=scroll;
}

function renderMain(){
  const a=state.answers.find(x=>x.id===state.selectedId);
  if(!a){
    mainInner.innerHTML='<div class="empty"><h2>还没有内容</h2>'+
      '<p>新建一条回答，把你写好的句型、短语和全文放进来，就能开始三种模式的挖空练习了。</p>'+
      '<button class="btn primary" onclick="openEditor(null)">+ 新建第一条</button></div>';
    return;
  }
  const mode=state.mode;
  let bodyHtml,footHtml='';
  if(mode==='full'){
    bodyHtml=renderFull(a.fullText||'');
  }else{
    const kind=mode==='pattern'?'pattern':'phrase';
    const items=computeItems(a,kind);
    let n=0; items.forEach(it=>{ if(it.spans.length) it.num=++n; });
    bodyHtml=renderMasked(a.fullText||'',items);
    const unmatched=items.filter(it=>it.spans.length===0);
    if(unmatched.length){
      footHtml='<div class="footnote">这些'+(mode==='pattern'?'句型':'短语')+'没在全文里找到，练习时已跳过（可能是措辞不同或写错）：<br>'+
        unmatched.map(it=>'<b>'+escHtml(it.en)+'</b>'+(it.zh?'（'+escHtml(it.zh)+'）':'')).join('；')+'</div>';
    }
  }
  const cardCls='card'+(state.showZh?' show-zh':'')+(state.revealAll?' reveal-blanks':'');
  mainInner.innerHTML=
    (groupOf(a)!==UNGROUPED?'<div class="brand-sub" style="margin-bottom:6px;">'+escHtml(groupOf(a))+'</div>':'')+
    '<h1 class="ans-title">'+escHtml(a.title||'（未命名）')+'</h1>'+
    '<div class="controls">'+
      '<div class="seg">'+
        '<button data-m="full" class="'+(mode==='full'?'on':'')+'">全文</button>'+
        '<button data-m="pattern" class="'+(mode==='pattern'?'on':'')+'">句型</button>'+
        '<button data-m="phrase" class="'+(mode==='phrase'?'on':'')+'">短语</button>'+
      '</div>'+
      '<div class="aux">'+
        '<button class="toggle'+(state.revealAll?' on':'')+'" id="tReveal"'+(mode==='full'?' hidden':'')+'>显示全部原文</button>'+
        '<button class="toggle'+(state.showZh?' on':'')+'" id="tZh"'+(mode==='full'?' hidden':'')+'>显示中文</button>'+
      '</div>'+
    '</div>'+
    '<div class="rowbtns">'+
      '<button class="linkbtn" onclick="openEditor(state.selectedId)">编辑</button>'+
      '<button class="linkbtn danger" id="delInline">删除</button>'+
    '</div>'+
    '<div class="'+cardCls+'" id="practiceCard">'+bodyHtml+'</div>'+
    footHtml;

  // wire mode buttons
  mainInner.querySelectorAll('.seg button').forEach(b=>{
    b.onclick=()=>{state.mode=b.dataset.m;renderMain();};
  });
  const tR=document.getElementById('tReveal'); if(tR)tR.onclick=()=>{state.revealAll=!state.revealAll;renderMain();};
  const tZ=document.getElementById('tZh'); if(tZ)tZ.onclick=()=>{state.showZh=!state.showZh;save();renderMain();};
  document.getElementById('delInline').onclick=()=>deleteAnswer(a.id);

  // card interactions (delegated)
  const card=document.getElementById('practiceCard');
  if(card){
    const syncDot=s=>{
      const sb=card.querySelector('.sbtn[data-s="'+s+'"]');if(!sb)return;
      const blanks=card.querySelectorAll('.blank[data-s="'+s+'"]');
      sb.classList.toggle('on',[...blanks].every(b=>b.classList.contains('revealed')));
    };
    card.addEventListener('click',e=>{
      const sb=e.target.closest('.sbtn');
      if(sb){
        const s=sb.dataset.s;
        const blanks=card.querySelectorAll('.blank[data-s="'+s+'"]');
        const allRev=[...blanks].every(b=>b.classList.contains('revealed'));
        blanks.forEach(b=>b.classList.toggle('revealed',!allRev));
        sb.classList.toggle('on',!allRev);
        return;
      }
      const bl=e.target.closest('.blank');
      if(bl){bl.classList.toggle('revealed');syncDot(bl.dataset.s);return;}
      const hl=e.target.closest('.hl');
      if(hl){hl.classList.toggle('pinned');}
    });
  }
}

// quick paste parser — order-agnostic, tolerant of markdown / numbering / labels
function parsePasted(raw){
  const lines=raw.replace(/\r\n/g,'\n').split('\n');
  const strip=l=>l.replace(/^[\s>*#\-•·\d.、)]+/,'').replace(/\s+/g,'');
  const KW={
    pattern:['句型','句式','sentencepatterns','sentencepattern','patterns','pattern'],
    phrase:['短语','词组','短句','phrases','phrase'],
    full:['回答全文','全文回答','答案全文','完整回答','fullanswer','fulltext','回答','全文','answer']
  };
  const order=['pattern','phrase','full'];
  function headerType(line){
    const s=strip(line).toLowerCase();
    if(!s)return null;
    for(const t of order){
      for(const k of KW[t]){
        if(s.startsWith(k)){
          const rest=s.slice(k.length).replace(/[()（）:：*]/g,'');
          if(rest.length<=24)return t;
        }
      }
    }
    return null;
  }
  const marks=[];
  lines.forEach((l,i)=>{const t=headerType(l);if(t)marks.push({i,type:t});});
  const firstMark=marks.length?marks[0].i:lines.length;
  let title='';
  for(let i=0;i<firstMark;i++){
    const l=lines[i];
    const mm=l.match(/^\s*(?:问题|标题|题目|question)\s*[:：]\s*(.+)$/i);
    if(mm){title=mm[1].trim();break;}
    if(!title&&l.trim()){title=l.replace(/^[\s>*#\-•]+/,'').trim();break;}
  }
  const sec={pattern:[],phrase:[],full:[]};
  for(let k=0;k<marks.length;k++){
    const cur=marks[k],nextI=k+1<marks.length?marks[k+1].i:lines.length;
    let body=lines.slice(cur.i+1,nextI);
    const inline=lines[cur.i].match(/[:：]\s*(.+)$/);
    if(inline)body=[inline[1]].concat(body);
    if(cur.type==='full'){sec.full.push(body.join('\n'));}
    else{body.forEach(l=>{const t=l.replace(/^[\s>*#\-•·]+/,'').replace(/^\d+[.)、]\s*/,'').trim();if(t)sec[cur.type].push(t);});}
  }
  return {title,patterns:sec.pattern,phrases:sec.phrase,full:sec.full.join('\n\n').replace(/^\s*[:：]\s*/,'').trim()};
}
function runParse(){
  const raw=document.getElementById('pasteBox').value;
  if(!raw.trim())return;
  const r=parsePasted(raw);
  if(r.title)document.getElementById('fTitle').value=r.title;
  if(r.patterns.length)document.getElementById('fPatterns').value=r.patterns.join('\n');
  if(r.phrases.length)document.getElementById('fPhrases').value=r.phrases.join('\n');
  if(r.full)document.getElementById('fFull').value=r.full;
}
document.getElementById('parseBtn').onclick=runParse;
document.getElementById('pasteBox').addEventListener('paste',()=>setTimeout(runParse,60));

/* ============================================================
   Import / export
   ============================================================ */
document.getElementById('newBtn').onclick=()=>openEditor(null);
document.getElementById('exportBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify({answers:state.answers},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  const d=new Date();const stamp=d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
  a.href=url;a.download='面试练习备份-'+stamp+'.json';a.click();URL.revokeObjectURL(url);
};
document.getElementById('importBtn').onclick=()=>document.getElementById('importFile').click();
document.getElementById('importFile').onchange=e=>{
  const file=e.target.files[0];if(!file)return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const d=JSON.parse(rd.result);
      const imported=(d.answers||d||[]).filter(x=>x&&x.fullText!==undefined);
      if(!imported.length){alert('这个文件里没有找到可导入的回答。');return;}
      if(confirm('导入 '+imported.length+' 条。选「确定」追加到现有内容，选「取消」则替换全部。')){
        imported.forEach(x=>{x.id=uid();state.answers.push(x);});
      }else{
        state.answers=imported.map(x=>({...x,id:uid()}));
      }
      state.selectedId=state.answers[0].id;save();renderAll();
    }catch(err){alert('读取失败：文件不是有效的 JSON。');}
  };
  rd.readAsText(file);
  e.target.value='';
};

/* ============================================================
   Boot
   ============================================================ */
document.getElementById('themeToggle').onclick=function(){
  const root=document.documentElement;
  const dark=root.getAttribute('data-theme')==='dark';
  if(dark)root.removeAttribute('data-theme');else root.setAttribute('data-theme','dark');
  try{localStorage.setItem('ip_theme',dark?'light':'dark');}catch(e){}
};
document.getElementById('listToggle').onclick=function(){
  const side=document.querySelector('.side');
  const open=side.classList.toggle('open');
  this.setAttribute('aria-expanded',open?'true':'false');
};
load();renderAll();
